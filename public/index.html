async function loadCalBookings() {
  const grid = $('cal-grid'); if(!grid) return;
  grid.innerHTML = spinner();
  const y = calDate.getFullYear(), m = calDate.getMonth();
  const start = new Date(y, m, 1).toISOString().split('T')[0];
  const end = new Date(y, m+1, 0).toISOString().split('T')[0];
  let params = `?start=${start}&end=${end}`;
  if (calCompany) params += `&company_id=${calCompany}`;
  else if (!isAdmin && currentCompanyId) params += `&company_id=${currentCompanyId}`;
  try {
    const data = await api('/api/bookings' + params);
    const bookings = data.bookings || data || [];
    const byDay = {};
    bookings.forEach(b => {
      const d = (b.preferred_date||b.appointment_date||'').split('T')[0];
      if (!byDay[d]) byDay[d] = [];
      byDay[d].push(b);
    });
    const firstDay = new Date(y, m, 1).getDay();
    const offset = (firstDay + 6) % 7;
    const daysInMonth = new Date(y, m+1, 0).getDate();
    const today = new Date().toISOString().split('T')[0];
    let html = '';
    for (let i = 0; i < offset; i++) html += '<div class="cal-day" style="background:var(--bg);"></div>';
    for (let d = 1; d <= daysInMonth; d++) {
      const dateStr = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const isToday = dateStr === today;
      const dayBookings = byDay[dateStr] || [];
      html += `<div class="cal-day ${isToday?'today':''}" onclick="showCalDay('${dateStr}')">
        <div style="font-weight:600; font-size:.75rem; color:${isToday?'var(--accent)':'var(--text2)'}; margin-bottom:.25rem;">${d}</div>
        ${dayBookings.slice(0,3).map(b => {
          const confirmed = b.confirmation_status === 'confirmed';
          const pending = b.confirmation_status === 'pending';
          const pillBorder = confirmed ? 'border-left:3px solid #22c55e;' : pending ? 'border-left:3px solid #f59e0b;' : '';
          const pillIcon = confirmed ? '✅ ' : pending ? '⏳ ' : '';
          return `<div class="cal-pill" style="background:${companyColor(b.company_id)};${pillBorder}">${pillIcon}${(b.preferred_time||b.appointment_time)?((b.preferred_time||b.appointment_time).slice(0,5)+' '):''}${b.name||''}</div>`;
        }).join('')}
        ${dayBookings.length>3?`<div style="font-size:.7rem; color:var(--text3); margin-top:.125rem;">+${dayBookings.length-3} til</div>`:''}
      </div>`;
    }
    grid.innerHTML = html;
    window._calBookings = byDay;
  } catch(e) { grid.innerHTML = '<p style="color:#f87171; grid-column:span 7; text-align:center; padding:2rem;">Feil ved lasting</p>'; }
}

  const t = b.preferred_time || b.appointment_time || '';
  if (t) {
    const m = t.match(/(\d{1,2})[:\.]?(\d{2})?/);
    if (m) { startTime = m[1].padStart(2,'0') + (m[2]||'00') + '00'; const eh = parseInt(m[1])+1; endTime = String(eh).padStart(2,'0') + (m[2]||'00') + '00'; }
  }
  const svc = b.service_requested || 'Bestilling';
  const addr = b.address || '';
  const ical = [
    'BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//COE AI//NO',
    'BEGIN:VEVENT',
    `DTSTART:${dt}T${startTime}`,
    `DTEND:${dt}T${endTime}`,
    `SUMMARY:${svc} - ${b.name||'Kunde'}`,
    `DESCRIPTION:Kunde: ${b.name||''}\\nTlf: ${b.phone||''}\\nTjeneste: ${svc}\\nTid: ${t}\\nStatus: ${b.confirmation_status==='confirmed'?'Bekreftet':'Venter'}`,
    addr ? `LOCATION:${addr}` : '',
    `UID:coe-${b.id}@coesystem`,
    'END:VEVENT','END:VCALENDAR'
  ].filter(Boolean).join('\r\n');
  const blob = new Blob([ical], {type:'text/calendar'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `bestilling-${b.name||b.id}.ics`;
  a.click();
}

function downloadDayIcal(dateStr) {
  const bookings = (window._calBookings || {})[dateStr] || [];
  if (!bookings.length) return;
  const dt = dateStr.replace(/-/g, '');
  let events = '';
  bookings.forEach(b => {
    let startTime = '090000', endTime = '100000';
    const t = b.preferred_time || b.appointment_time || '';
    if (t) { const m = t.match(/(\d{1,2})[:\.]?(\d{2})?/); if (m) { startTime = m[1].padStart(2,'0') + (m[2]||'00') + '00'; const eh = parseInt(m[1])+1; endTime = String(eh).padStart(2,'0') + (m[2]||'00') + '00'; } }
    const svc = b.service_requested || 'Bestilling';
    events += ['BEGIN:VEVENT',`DTSTART:${dt}T${startTime}`,`DTEND:${dt}T${endTime}`,`SUMMARY:${svc} - ${b.name||'Kunde'}`,`DESCRIPTION:Kunde: ${b.name||''}\\nTlf: ${b.phone||''}\\nTjeneste: ${svc}`,b.address?`LOCATION:${b.address}`:'',`UID:coe-${b.id}@coesystem`,'END:VEVENT'].filter(Boolean).join('\r\n') + '\r\n';
  });
  const ical = `BEGIN:VCALENDAR\r\nVERSION:2.0\r\nPRODID:-//COE AI//NO\r\n${events}END:VCALENDAR`;
  const blob = new Blob([ical], {type:'text/calendar'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `bestillinger-${dateStr}.ics`;
  a.click();
}

async function startNewChat() {
  const companyId = $('chat-company')?.value;
  if (!companyId) return;

  chatCompanyId = companyId;
  chatSessionId = null;
  chatMessages = [];

  const messagesEl = $('chat-messages');
  messagesEl.innerHTML = '<div class="chat-bubble system">Starter ny samtale...</div>';
  $('chat-status').textContent = 'Kobler til...';

  try {
    const resp = await api('/api/chat', {
      method: 'POST',
      body: JSON.stringify({ companyId: Number(companyId) })
    });

    chatSessionId = resp.sessionId;
    chatMessages = [];
    addChatMessage('ai', resp.response);
    $('chat-status').textContent = 'Tilkoblet — skriv en melding';
    $('chat-input').disabled = false;
    $('chat-send-btn').disabled = false;
    $('chat-input').focus();
    updateCollectedData(resp.collectedData);
  } catch(e) {
    messagesEl.innerHTML = '<div class="chat-bubble system" style="color:#f87171;">Feil ved start av chat. Prøv igjen.</div>';
    $('chat-status').textContent = 'Feil — prøv igjen';
  }
}

async function sendChatMessage() {
  const input = $('chat-input');
  const message = input.value.trim();
  if (!message || !chatSessionId) return;

  input.value = '';
  addChatMessage('user', message);

  // Show typing indicator
  const typingId = 'typing-' + Date.now();
  const messagesEl = $('chat-messages');
  const typingEl = document.createElement('div');
  typingEl.className = 'chat-bubble ai';
  typingEl.id = typingId;
  typingEl.innerHTML = '<span style="opacity:.6;">Skriv...</span>';
  messagesEl.appendChild(typingEl);
  messagesEl.scrollTop = messagesEl.scrollHeight;

  try {
    const resp = await api('/api/chat', {
      method: 'POST',
      body: JSON.stringify({
        companyId: Number(chatCompanyId),
        sessionId: chatSessionId,
        message
      })
    });

    // Remove typing indicator
    document.getElementById(typingId)?.remove();

    addChatMessage('ai', resp.response);
    updateCollectedData(resp.collectedData);

    if (resp.complete) {
      addChatMessage('system', '✅ Samtale fullført — alle data er samlet inn!');
      $('chat-status').textContent = 'Samtale fullført';
    }
  } catch(e) {
    document.getElementById(typingId)?.remove();
    addChatMessage('system', '⚠️ Feil ved sending. Prøv igjen.');
  }
}

function addChatMessage(type, text) {
  const messagesEl = $('chat-messages');
  // Remove initial system message if present
  if (chatMessages.length === 0 && type !== 'system') {
    const firstChild = messagesEl.querySelector('.chat-bubble.system');
    if (firstChild && firstChild.textContent.includes('Velg et selskap')) firstChild.remove();
  }

  chatMessages.push({ type, text });

  const bubble = document.createElement('div');
  bubble.className = `chat-bubble ${type}`;
  bubble.textContent = text;
  messagesEl.appendChild(bubble);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function updateCollectedData(data) {
  const el = $('chat-collected');
  if (!data || Object.keys(data).length === 0) {
    el.innerHTML = '<h4>📋 Samlet data</h4><p style="font-size:.8rem; color:var(--text3); font-style:italic;">Ingen data samlet ennå</p>';
    return;
  }
  el.innerHTML = '<h4>📋 Samlet data</h4>' + Object.entries(data).map(([k,v]) =>
    `<div class="data-item"><span style="color:var(--text3);">${k}</span><span style="color:var(--text); font-weight:500;">${v || '–'}</span></div>`
  ).join('');
}

function clearChat() {
  chatSessionId = null;
  chatMessages = [];
  const messagesEl = $('chat-messages');
  if (messagesEl) messagesEl.innerHTML = '<div class="chat-bubble system">Velg et selskap og start en samtale med AI-assistenten</div>';
  $('chat-input').disabled = true;
  $('chat-send-btn').disabled = true;
  $('chat-status').textContent = 'Velg et selskap for å starte';
  updateCollectedData({});
}

function renderAutoFixesList() {
  const data = window._afData || [];
  const companyFilter = $('af-company')?.value || '';
  const severityFilter = $('af-severity')?.value || '';
  const activeOnly = $('af-active')?.checked;

  let filtered = [...data].sort((a,b) => new Date(b.created_at||0) - new Date(a.created_at||0));
  if (companyFilter) filtered = filtered.filter(d => String(d.company_id) === companyFilter);
  if (severityFilter) filtered = filtered.filter(d => d.severity === severityFilter);
  if (activeOnly) filtered = filtered.filter(d => d.active);

  // Stats
  const kritisk = filtered.filter(d => d.severity === 'kritisk').length;
  const viktig = filtered.filter(d => d.severity === 'viktig').length;
  const minor = filtered.filter(d => d.severity === 'minor' || (!d.severity || d.severity === 'generell')).length;
  const active = filtered.filter(d => d.active).length;

  $('af-stats').innerHTML = `
    <div class="stat-card" style="text-align:center;"><div style="font-size:1.75rem; font-weight:700;">${filtered.length}</div><div style="color:var(--text3); font-size:.75rem;">Totalt</div></div>

    <div class="stat-card" style="text-align:center;"><div style="font-size:1.75rem; font-weight:700; color:#f59e0b;">${viktig}</div><div style="color:var(--text3); font-size:.75rem;">🟡 Viktig</div></div>
    <div class="stat-card" style="text-align:center;"><div style="font-size:1.75rem; font-weight:700; color:#22c55e;">${minor}</div><div style="color:var(--text3); font-size:.75rem;">🟢 Minor</div></div>
    <div class="stat-card" style="text-align:center;"><div style="font-size:1.75rem; font-weight:700; color:var(--accent);">${active}</div><div style="color:var(--text3); font-size:.75rem;">Aktive</div></div>`;

  // Update badge
  const badge = document.getElementById('nav-fix-badge');
  if (badge) {
    const totalActive = data.filter(d => d.active).length;
    if (totalActive > 0) { badge.style.display = ''; badge.textContent = totalActive; }
    else { badge.style.display = 'none'; }
  }

  if (!filtered.length) {
    $('af-list').innerHTML = '<div class="stat-card" style="text-align:center; padding:2rem;"><div style="font-size:2rem; margin-bottom:.5rem;">✨</div><p style="color:var(--text2);">Ingen auto-rettinger ennå. Systemet lærer etter første samtale!</p></div>';
    return;
  }

  const severityIcon = s => s === 'kritisk' ? '🔴' : s === 'viktig' ? '🟡' : '🟢';
  const severityColor = s => s === 'kritisk' ? '#fecaca' : s === 'viktig' ? '#fef3c7' : '#dcfce7';

  const showAll = window._afShowAll || false;
  const displayItems = showAll ? filtered : filtered.slice(0, 3);
  const hasMore = filtered.length > 3;
  $('af-list').innerHTML = displayItems.map(fix => `
    <div class="stat-card" style="margin-bottom:.75rem; border-left:3px solid ${severityColor(fix.severity)}; ${!fix.active ? 'opacity:.5;' : ''}">
      <div style="display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:.5rem;">
        <div style="display:flex; align-items:center; gap:.5rem;">
          <span>${severityIcon(fix.severity)}</span>

        </div>
        <div style="display:flex; align-items:center; gap:.5rem;">
          <span style="font-size:.7rem; color:var(--text3);">${fix.company_name || ''}</span>
          <span style="font-size:.7rem; color:var(--text3);">${fix.created_at ? new Date(fix.created_at).toLocaleDateString('nb-NO') : ''}</span>
          <button onclick="toggleAutoFix(${fix.id}, ${fix.active})" style="font-size:.7rem; padding:.2rem .5rem; border-radius:4px; border:1px solid var(--border); background:${fix.active ? '#fee2e2' : '#dcfce7'}; color:${fix.active ? '#dc2626' : '#16a34a'}; cursor:pointer;">

      <p style="font-size:.85rem; color:var(--text2); margin-bottom:.5rem;">${fix.description || ''}</p>
      ${fix.old_behavior ? `<div style="font-size:.75rem; display:flex; gap:1rem; flex-wrap:wrap;">
