<!DOCTYPE html>
<html lang="nb">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>COE CRM</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root { --sidebar-w: 200px; --bg: #0f172a; --bg2: #1e293b; --bg3: #334155; --card: #1e293b; --border: #334155; --text: #e2e8f0; --text2: #94a3b8; --text3: #64748b; --accent: #3b82f6; --accent2: #2563eb; --green: #22c55e; --red: #ef4444; --yellow: #f59e0b; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
  .sidebar { width: var(--sidebar-w); background: var(--bg2); min-height: 100vh; position: fixed; left: 0; top: 0; z-index: 40; transition: transform .2s; border-right: 1px solid var(--border); display: flex; flex-direction: column; }
  .main-content { margin-left: var(--sidebar-w); min-height: 100vh; }
  .nav-item { display: flex; align-items: center; gap: .6rem; padding: .55rem 1rem; color: var(--text2); cursor: pointer; transition: all .15s; border-radius: .5rem; margin: .2rem .5rem; font-size: .85rem; }
  .nav-item:hover { background: var(--bg3); color: var(--text); }
  .nav-item.active { background: var(--accent); color: #fff; }
  .stat-card { background: var(--card); border-radius: .75rem; padding: 1rem; border: 1px solid var(--border); }
  .badge { display: inline-flex; align-items: center; padding: .125rem .625rem; border-radius: 9999px; font-size: .75rem; font-weight: 600; }
  .badge-green { background: #16a34a30; color: #4ade80; }
  .badge-blue { background: #2563eb30; color: #60a5fa; }
  .badge-yellow { background: #d9770630; color: #fbbf24; }
  .badge-red { background: #dc262630; color: #f87171; }
  .badge-gray { background: #47556930; color: #94a3b8; }
  .badge-purple { background: #7c3aed30; color: #a78bfa; }
  .error-warning { display: inline-flex; align-items: center; gap: .25rem; background: #dc262650; color: #fca5a5; padding: .2rem .6rem; border-radius: .5rem; font-size: .8rem; font-weight: 700; animation: pulse-error 1.5s ease-in-out infinite; border: 2px solid #f87171; }
  @keyframes pulse-error { 0%, 100% { opacity: 1; box-shadow: 0 0 8px #dc262680; } 50% { opacity: .7; box-shadow: 0 0 20px #dc2626cc; } }
  @keyframes pulse-warn { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.3); } }
  .bar { background: var(--accent); border-radius: .25rem .25rem 0 0; min-height: 4px; transition: height .3s; }
  table { width: 100%; border-collapse: collapse; }
  th { text-align: left; padding: .75rem 1rem; font-size: .75rem; text-transform: uppercase; color: var(--text3); font-weight: 600; border-bottom: 1px solid var(--border); }
  td { padding: .75rem 1rem; border-bottom: 1px solid #1e293b; font-size: .875rem; color: var(--text2); }
  tr:hover td { background: #1e293b80; }
  .spinner { border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; width: 2rem; height: 2rem; animation: spin .6s linear infinite; margin: 2rem auto; display: block; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.6); z-index: 50; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
  .modal { background: var(--card); border-radius: .75rem; padding: 2rem; max-width: 600px; width: 95%; max-height: 90vh; overflow-y: auto; border: 1px solid var(--border); }
  .cal-day { min-height: 100px; border: 1px solid var(--border); padding: .25rem; font-size: .75rem; cursor: pointer; }
  .cal-day:hover { background: var(--bg2); }
  .cal-day.today { background: #1e3a5f; border-color: var(--accent); }
  .cal-pill { padding: .125rem .375rem; border-radius: .25rem; font-size: .65rem; margin-bottom: .125rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #fff; }
  input, select, textarea { border: 1px solid var(--border); border-radius: .5rem; padding: .5rem .75rem; font-size: .875rem; width: 100%; outline: none; transition: border-color .15s; background: var(--bg); color: var(--text); }
  input:focus, select:focus, textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(59,130,246,.15); }
  input::placeholder, textarea::placeholder { color: var(--text3); }
  option { background: var(--bg2); color: var(--text); }
  .btn { padding: .5rem 1rem; border-radius: .5rem; font-size: .875rem; font-weight: 500; cursor: pointer; border: none; transition: all .15s; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: var(--accent2); }
  .btn-danger { background: var(--red); color: #fff; }
  .btn-danger:hover { background: #b91c1c; }
  .btn-secondary { background: var(--bg3); color: var(--text2); }
  .btn-secondary:hover { background: #475569; color: var(--text); }
  .btn-success { background: var(--green); color: #fff; }
  .btn-success:hover { background: #16a34a; }

  /* Login screen — 3-column layout */
  .login-screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%); padding: 2rem; }
  .login-layout { display: flex; align-items: center; gap: 3rem; max-width: 1100px; width: 100%; }
  .login-left { flex: 0 0 auto; text-align: center; opacity: .7; }
  .login-center { flex: 1; max-width: 360px; background: var(--card); border-radius: 1rem; padding: 2rem; border: 1px solid var(--border); box-shadow: 0 25px 60px rgba(0,0,0,.5); }
  .login-right { flex: 0 0 auto; text-align: center; }
  @keyframes spin-gear { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  .gear-icon { font-size: 2rem; display: inline-block; animation: spin-gear 4s linear infinite; line-height: 1; }
  @keyframes vibrate { 0%,100% { transform: rotate(0deg); } 10% { transform: rotate(-12deg); } 20% { transform: rotate(12deg); } 30% { transform: rotate(-10deg); } 40% { transform: rotate(10deg); } 50% { transform: rotate(-6deg); } 60% { transform: rotate(6deg); } 70% { transform: rotate(0deg); } }
  @keyframes scribble { 0%,100% { transform: rotate(-5deg) translate(0,0); } 25% { transform: rotate(2deg) translate(2px,-2px); } 50% { transform: rotate(-3deg) translate(-1px,1px); } 75% { transform: rotate(4deg) translate(1px,-1px); } }
  @keyframes ring-bell { 0%,100% { transform: rotate(0deg); } 5% { transform: rotate(15deg); } 10% { transform: rotate(-15deg); } 15% { transform: rotate(12deg); } 20% { transform: rotate(-12deg); } 25% { transform: rotate(8deg); } 30% { transform: rotate(-8deg); } 35% { transform: rotate(4deg); } 40% { transform: rotate(0deg); } }
  .login-mini-icons { display: flex; justify-content: center; gap: 1rem; margin-top: .5rem; }
  .login-mini-icons span { font-size: 1.2rem; display: inline-block; }
  .icon-phone { animation: vibrate 1.5s ease-in-out infinite; }
  .icon-calendar { animation: scribble 2s ease-in-out infinite; }
  .icon-bell { animation: ring-bell 2.5s ease-in-out infinite; }
  /* Responsive: moved to comprehensive mobile block below */

  /* Audio player styles */
  .audio-entry { border: 1px solid var(--border); border-radius: .75rem; padding: 1rem 1.25rem; margin-bottom: .75rem; background: var(--bg); }
  .audio-entry:hover { background: var(--bg2); }
  .audio-entry audio { display: none; }
  .custom-audio-player { background: linear-gradient(135deg, #1e293b, #334155); border-radius: .75rem; padding: .75rem 1rem; margin-top: .5rem; }
  .audio-controls { display: flex; align-items: center; gap: .75rem; }
  .audio-play-btn { background: var(--accent); color: white; border: none; border-radius: 50%; width: 36px; height: 36px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1rem; flex-shrink: 0; transition: transform .15s; }
  .audio-play-btn:hover { transform: scale(1.1); }
  .audio-progress-wrap { flex: 1; display: flex; flex-direction: column; gap: .25rem; }
  .audio-progress-bar { width: 100%; height: 6px; background: rgba(255,255,255,.15); border-radius: 3px; cursor: pointer; position: relative; overflow: hidden; }
  .audio-progress-fill { height: 100%; background: var(--accent); border-radius: 3px; width: 0%; transition: width .1s linear; }
  .audio-time { display: flex; justify-content: space-between; font-size: .7rem; color: rgba(255,255,255,.6); }
  .audio-speed-btn { background: rgba(255,255,255,.15); color: rgba(255,255,255,.8); border: none; border-radius: .25rem; padding: .15rem .4rem; font-size: .65rem; cursor: pointer; flex-shrink: 0; }
  .audio-speed-btn:hover { background: rgba(255,255,255,.25); }

  /* Phone routing highlight */
  .phone-highlight { background: linear-gradient(135deg, #1e3a5f 0%, #1e40af30 100%); border: 1px solid #3b82f650; border-radius: .75rem; padding: 1rem 1.25rem; }

  /* Chat widget styles */
  .chat-container { display: flex; flex-direction: column; height: calc(100vh - 180px); max-height: 700px; }
  .chat-messages { flex: 1; overflow-y: auto; padding: 1.25rem; display: flex; flex-direction: column; gap: 1rem; }
  .chat-bubble { max-width: 80%; padding: .75rem 1rem; border-radius: 1rem; font-size: .875rem; line-height: 1.5; word-wrap: break-word; }
  .chat-bubble.ai { background: var(--bg3); color: var(--text); border-bottom-left-radius: .25rem; align-self: flex-start; }
  .chat-bubble.user { background: var(--accent); color: #fff; border-bottom-right-radius: .25rem; align-self: flex-end; }
  .chat-bubble.system { background: transparent; color: var(--text3); font-size: .75rem; align-self: center; font-style: italic; }
  .chat-input-area { display: flex; gap: .5rem; padding: 1rem; border-top: 1px solid var(--border); background: var(--bg2); border-radius: 0 0 .75rem .75rem; }
  .chat-input-area input { flex: 1; }
  .chat-collected { background: var(--bg); border: 1px solid var(--border); border-radius: .75rem; padding: 1rem; }
  .chat-collected h4 { font-size: .8rem; color: var(--text3); text-transform: uppercase; margin-bottom: .5rem; letter-spacing: .05em; }
  .chat-collected .data-item { display: flex; justify-content: space-between; padding: .25rem 0; font-size: .8rem; border-bottom: 1px solid var(--border); }
  .chat-collected .data-item:last-child { border-bottom: none; }

  /* Availability radio styles */
  .avail-radio { display: flex; flex-direction: column; gap: .5rem; }
  .avail-radio label { display: flex; align-items: center; gap: .5rem; cursor: pointer; font-size: .875rem; color: var(--text2); padding: .375rem .5rem; border-radius: .375rem; transition: background .15s; }
  .avail-radio label:hover { background: var(--bg3); }
  .avail-radio input[type="radio"] { width: auto; accent-color: var(--accent); }

  /* Header company name — full width, no truncation */
  .header-company-name {
    max-width: 400px;
    white-space: nowrap;
    overflow: visible;
    display: inline-block;
    vertical-align: middle;
    margin-left: 1rem;
  }
  /* Clickable stat cards */
  .stat-card-btn { cursor: pointer; transition: all .15s; }
  .stat-card-btn:hover { border-color: var(--accent); transform: translateY(-2px); box-shadow: 0 4px 12px rgba(0,0,0,.3); }
  /* Industry theme colors */
  .industry-theme-planke { border-top: 3px solid #d97706; }
  .industry-theme-vaskeri { border-top: 3px solid #06b6d4; }
  .industry-theme-kosmetikk { border-top: 3px solid #ec4899; }
  .industry-theme-vvs { border-top: 3px solid #3b82f6; }
  .industry-theme-elektriker { border-top: 3px solid #f59e0b; }
  .industry-theme-maler { border-top: 3px solid #8b5cf6; }
  .industry-theme-antikviteter { border-top: 3px solid #a16207; }
  .industry-theme-frisor { border-top: 3px solid #ec4899; }
  .industry-theme-general { border-top: 3px solid #6366f1; }

  /* ===== MOBILE RESPONSIVE ===== */
  @media (max-width: 768px) {
    /* Login page — card on top, logos side-by-side at bottom on mobile */
    .login-screen { padding: .75rem !important; align-items: flex-start !important; padding-top: 2rem !important; }
    .login-screen > div { 
      flex-direction: row !important; flex-wrap: wrap !important; 
      gap: .5rem !important; padding: 0 !important; 
      justify-content: center !important; align-items: flex-start !important;
    }
    .login-card { 
      max-width: 100% !important; width: 100% !important; flex-basis: 100% !important;
      flex: 0 0 auto !important; 
      order: 1 !important; margin-top: 0 !important; padding: 1rem 1.25rem !important;
    }
    .login-card .gear-icon { font-size: 1.1rem !important; margin-bottom: 0 !important; }
    .login-card h1 { font-size: 1.1rem !important; margin-top: .1rem !important; }
    .login-mini-icons { margin: .1rem 0 !important; font-size: .6rem !important; }
    .login-card p { font-size: .7rem !important; margin-top: .1rem !important; }
    .login-card label { font-size: .8rem !important; }
    .login-card input { padding: .6rem !important; font-size: .9rem !important; }
    .login-card .btn { padding: .6rem !important; font-size: .9rem !important; }
    .login-logo-side { 
      flex: 0 0 auto !important; padding: .25rem !important; 
      width: 44% !important; max-width: 44vw !important; 
      order: 2 !important;
    }
    .login-logo-side img { max-height: 25vh !important; width: 100% !important; max-width: none !important; object-fit: contain !important; }
    

    /* Dashboard: siste bestillinger first on mobile */
    .dash-bottom-grid { grid-template-columns: 1fr !important; }
    .dash-recent-card { order: 1 !important; }
    .dash-chart-card { order: 2 !important; }

    /* Sidebar */
    .sidebar { 
      position: fixed !important; left: -210px !important; top: 0 !important; bottom: 0 !important; 
      z-index: 100 !important; transition: left 0.3s !important; width: 200px !important;
      transform: none !important;
    }
    .sidebar.open { left: 0 !important; }
    .sidebar-overlay {
      display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.5); z-index: 99;
    }
    .sidebar-overlay.active { display: block; }
    
    /* Main content — KRITISK: fjern stor padding, bruk hele bredden */
    .main-content, .main { margin-left: 0 !important; width: 100% !important; padding: 0 !important; }
    #app { padding: 0.75rem !important; }
    #main-wrapper { margin-left: 0 !important; width: 100% !important; }
    
    /* Mobile header */
    #mobile-header { display: flex !important; position: fixed !important; top: 0 !important; left: 0 !important; right: 0 !important; z-index: 30 !important; }
    #app { padding-top: 4.5rem !important; }
    #app > h2:first-child { padding-top: .5rem; }
    
    /* FORCE alle grids til 1 kolonne — bruker bred selector */
    div[style*="grid-template-columns"] {
      grid-template-columns: 1fr !important;
    }
    .stats-grid, .stat-cards { grid-template-columns: 1fr !important; }
    .stat-card, .company-card { min-width: 0 !important; width: 100% !important; box-sizing: border-box !important; }
    
    /* Tables */
    table { display: block; overflow-x: auto; font-size: 0.8rem; }
    th, td { padding: 0.4rem 0.6rem !important; white-space: normal !important; }
    
    /* Header — wrap alt */
    .header, [style*="justify-content:space-between"] {
      flex-wrap: wrap !important; gap: 0.5rem !important;
    }
    .header-company-name { max-width: 200px !important; font-size: 0.85rem !important; }
    
    /* Alle flex-containere med gap stacker vertikalt */
    div[style*="display:flex"][style*="gap"] {
      flex-wrap: wrap !important;
    }
    
    /* Customer cards */
    .customer-card, .call-card, .booking-card {
      padding: 0.75rem !important;
    }
    
    /* Buttons — lesbare på mobil */
    button, .btn { font-size: 0.8rem !important; padding: 0.5rem 0.8rem !important; min-height: 36px !important; }
    
    /* Flex layouts stack vertikalt */
    .customer-header, .call-header {
      flex-direction: column !important; align-items: flex-start !important;
    }
    
    /* Calendar — kompakt + weekdays left-aligned */
    .calendar-grid { font-size: 0.7rem !important; }
    .calendar-grid td { padding: 0.2rem !important; }
    .calendar-grid th { text-align: left !important; padding-left: .25rem !important; }
    .cal-day { min-height: 50px !important; }
    
    /* Modal — full bredde */
    .modal { padding: 1rem !important; width: 98% !important; max-height: 95vh !important; }
    
    /* Text wrapping — ALDRI overflow */
    * { word-break: break-word !important; overflow-wrap: break-word !important; }
    pre, code { white-space: pre-wrap !important; word-break: break-all !important; }
    
    /* Company list logos */
    .company-logo { width: 60px !important; height: 60px !important; }
    
    /* Tabs — ALDRI kutt tekst */
    .tabs, [role="tablist"] { 
      flex-wrap: wrap !important; gap: 0.25rem !important; 
      overflow-x: auto !important; -webkit-overflow-scrolling: touch !important;
    }
    .tab, [role="tab"] { 
      font-size: 0.75rem !important; padding: 0.35rem 0.6rem !important; 
      white-space: nowrap !important; flex-shrink: 0 !important;
    }
    
    /* Audio — full bredde */
    audio { width: 100% !important; }
    
    /* Desktop-only skjules */
    .desktop-only { display: none !important; }
    
    /* Sørg for vertikal scroll fungerer */
    body, html { 
      overflow-x: hidden !important; 
      overflow-y: auto !important; 
      -webkit-overflow-scrolling: touch !important;
      max-width: 100vw !important;
    }
    
    /* Fix sticky elements */
    .sidebar-footer { 
      position: relative !important; 
      margin-top: auto !important;
    }
    
    /* Inline font-sizes for stat cards */
    .stat-card p[style*="font-size:2rem"] { font-size: 1.5rem !important; }
    .stat-card p[style*="font-size:2.5rem"] { font-size: 2rem !important; }
    
    /* Fix company detail 2-column grids */
    div[style*="2fr 1fr"], div[style*="1fr 1fr"], div[style*="1fr 300px"] {
      grid-template-columns: 1fr !important;
    }
    
    /* Sidebar bottom always visible on mobile */
    #sidebar .sidebar-footer, #sidebar [onclick*="logout"] {
      visibility: visible !important; display: block !important;
    }
    .sidebar { overflow-y: auto !important; -webkit-overflow-scrolling: touch !important; max-height: 100vh !important; }
    .sidebar .nav-item { padding: .4rem .75rem !important; font-size: .78rem !important; margin: .1rem .4rem !important; }
    .sidebar h2 { font-size: 1rem !important; }
    .sidebar p { font-size: .65rem !important; }
    #sidebar-confirmed { max-height: 120px !important; overflow-y: auto !important; }
    #sidebar-confirmed .nav-item, #sidebar-confirmed > div > div { font-size: .75rem !important; padding: .3rem .5rem !important; }
    #sidebar > div:last-child, #sidebar [style*="margin-top:auto"] {
      position: sticky !important; bottom: 0 !important; 
      background: var(--bg2) !important; padding: .4rem !important;
      border-top: 1px solid var(--border) !important;
      z-index: 5 !important;
    }
    #sidebar > div:last-child button, #sidebar [style*="margin-top:auto"] button {
      font-size: .75rem !important; padding: .35rem .5rem !important; min-height: 30px !important;
    }
  }

  /* Small phones */
  @media (max-width: 400px) {
    .header-company-name { max-width: 140px !important; }
    .tab, [role="tab"] { font-size: 0.65rem !important; }
    button, .btn { font-size: 0.7rem !important; }
    #app { padding: 0.5rem !important; padding-top: 4.5rem !important; }
  }

.source-tab { background:#1e293b; color:var(--text3); border:1px solid var(--border); transition:all .15s; }
.source-tab.active { background:var(--accent); color:#fff; border-color:var(--accent); }
.source-tab:hover { opacity:.85; }
</style>
</head>
<body>

<!-- Login Screen -->
<div id="login-screen" class="login-screen">
  <div style="display:flex; align-items:center; justify-content:center; gap:1rem; max-width:1200px; width:100%; padding:0 1rem;">
    <div class="login-logo-side" style="flex:1; display:flex; align-items:center; justify-content:center; min-width:0; padding:1rem;">
      <img src="/crm/ga-logo.png" alt="Gudbrandsdal Automatisering" style="width:100%; max-width:none; height:auto; max-height:80vh; object-fit:contain; filter:drop-shadow(0 4px 16px rgba(0,0,0,.4)); cursor:pointer;" onclick="window.open(this.src)">
    </div>
  <div class="login-card" style="flex:0 0 360px; max-width:360px;">
    <div style="text-align:center; margin-bottom:1.5rem;">
      <div class="gear-icon">⚙️</div>
      <h1 style="font-size:1.75rem; font-weight:800; color:var(--text); line-height:1.3; margin-top:.5rem;">COE CRM</h1>
      <div class="login-mini-icons">
        <span>📞</span><span>📅</span><span>🔔</span>
      </div>
      <p style="color:var(--text3); font-size:.875rem; margin-top:.5rem;">Logg inn for å fortsette</p>
    </div>
    <div style="display:flex; flex-direction:column; gap:1rem;">
      <div>
        <label style="font-size:.875rem; font-weight:500; color:var(--text2); display:block; margin-bottom:.25rem;">Passord</label>
        <input id="login-password" type="password" placeholder="Skriv inn passord...">
      </div>
      <div id="login-error" style="color:#f87171; font-size:.875rem; display:none;"></div>
      <button class="btn btn-primary" style="width:100%; padding:.75rem; font-size:1rem;" onclick="doLogin()">Logg inn</button>
      <div style="text-align:center; margin-top:1.5rem;">
        <p style="color:var(--text3); font-size:.8rem;">I samarbeid med Gudbrandsdal Automatisering</p>
      </div>
    </div>
  </div>
    <div class="login-logo-side" style="flex:1; display:flex; align-items:center; justify-content:center; min-width:0; padding:1rem;">
      <img src="/crm/ga-postit.png" alt="GA Post-it" style="width:100%; max-width:none; height:auto; max-height:80vh; object-fit:contain; filter:drop-shadow(0 4px 16px rgba(0,0,0,.4)); cursor:pointer;" onclick="window.open(this.src)">
    </div>
  </div>
</div>

<!-- Sidebar -->
<aside class="sidebar" id="sidebar" style="display:none;">
  <div style="padding:.75rem; border-bottom:1px solid var(--border); text-align:center;">

const BASE = '';  // Same origin — all API calls are relative
// ── Auth ──
let currentCompanyId = null;
let isAdmin = false;
let currentCompanyName = '';
let companiesCache = [];

function getSession() {
  return {
    companyId: sessionStorage.getItem('coe_company_id'),
    isAdmin: sessionStorage.getItem('coe_is_admin') === 'true',
    companyName: sessionStorage.getItem('coe_company_name') || ''
  };
}

function isLoggedIn() {
  const s = getSession();
  return s.isAdmin || (s.companyId && s.companyId !== '');
}

// Lockout handled server-side (2 attempts, permanent lock)
const _loginState = { locked: false, attempts: 0 };

async function doLogin() {
  const password = document.getElementById('login-password').value;
  const errorEl = document.getElementById('login-error');
  errorEl.style.display = 'none';

  if (_loginState.locked) {
    errorEl.textContent = 'Kontoen er sperret. Kontakt admin for å oppheve.';
    errorEl.style.display = '';
    return;
  }

  if (!password) { errorEl.textContent = 'Skriv inn passord'; errorEl.style.display = ''; return; }

  try {
    const resp = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password })
    });
    const data = await resp.json();

    if (data.success) {
      _loginState.locked = false;
      sessionStorage.setItem('coe_is_admin', String(data.isAdmin));
      sessionStorage.setItem('coe_company_id', data.companyId ? String(data.companyId) : '');
      sessionStorage.setItem('coe_company_name', data.companyName || '');
      location.reload();
    } else {
      if (data.locked) {
        _loginState.locked = true;
        errorEl.textContent = 'Kontoen er sperret etter 2 forsøk. Kontakt admin for å oppheve.';
      } else {
        errorEl.textContent = data.error || 'Feil passord';
      }
      errorEl.style.display = '';
    }
  } catch(e) {
    errorEl.textContent = 'Feil ved innlogging';
    errorEl.style.display = '';
  }
}

function doLogout() {
  sessionStorage.removeItem('coe_company_id');
  sessionStorage.removeItem('coe_is_admin');
  sessionStorage.removeItem('coe_company_name');
  location.reload();
}

// Handle enter key on login
document.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && document.getElementById('login-screen').style.display !== 'none') {
    doLogin();
  }
});

// ── Boot ──
async function boot() {
  if (!isLoggedIn()) {
    document.getElementById('login-screen').style.display = '';
    document.getElementById('sidebar').style.display = 'none';
    document.getElementById('main-wrapper').style.display = 'none';
    document.getElementById('mobile-header').style.display = 'none';
    return;
  }

  const session = getSession();
  currentCompanyId = session.companyId || null;
  isAdmin = session.isAdmin;
  currentCompanyName = session.companyName;

  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('sidebar').style.display = '';
  document.getElementById('main-wrapper').style.display = '';
  document.getElementById('mobile-header').style.display = 'flex';

  // Update sidebar subtitle & user info
  const subtitle = document.getElementById('sidebar-subtitle');
  const userEl = document.getElementById('sidebar-user');
  const mobileNameEl = document.getElementById('mobile-company-name');
  if (isAdmin) {
    subtitle.textContent = '🔑 Administrator';
    userEl.textContent = '🔑 Admin';
    if (mobileNameEl) mobileNameEl.textContent = '— Admin';
  } else {
    subtitle.textContent = currentCompanyName || 'Kundeoppfølging';
    userEl.textContent = currentCompanyName;
    if (mobileNameEl) mobileNameEl.textContent = currentCompanyName ? ('— ' + currentCompanyName) : '';
  }

  // Load companies cache
  try { companiesCache = await api('/api/companies'); } catch(e) {}

  // Render sidebar sections
  renderSidebarConfirmed();
  renderSidebarCompanies();

  route();
}

boot();

function api(url, opts = {}) {
  return fetch(url, { headers: { 'Content-Type': 'application/json' }, ...opts })

    .catch(e => { console.error('API error:', e); throw e; });
}

function addCompanyFilter(params) {
  if (!isAdmin && currentCompanyId) {
    if (params instanceof URLSearchParams) {
      params.set('company_id', currentCompanyId);
    } else {
      const sep = params.includes('?') ? '&' : '?';
      return params + sep + 'company_id=' + currentCompanyId;
    }
  }
  return params;
}

function fmtPrice(v) {
  if (v == null) return '–';
  return Number(v).toLocaleString('nb-NO') + ' kr';
}
function fmtPhone(p) {
  if (!p) return '–';
  p = String(p).replace(/\D/g,'');
  if (p.length === 8) return p.replace(/(\d{3})(\d{2})(\d{3})/, '$1 $2 $3');
  if (p.length === 11 && p.startsWith('47')) return '+47 ' + fmtPhone(p.slice(2));
  return p;
}
function fmtDate(d) {
  if (!d) return '–';
  const dt = new Date(d);
  if (isNaN(dt.getTime())) return String(d);
  return dt.toLocaleDateString('nb-NO', { day:'numeric', month:'short', year:'numeric' });
}
function fmtDateTime(d) {
  if (!d) return '–';
  const dt = new Date(d);
  if (isNaN(dt.getTime())) return String(d);
  return dt.toLocaleString('nb-NO', { day:'numeric', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit' });
}
function escHtml(s) { if (!s) return ''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function fmtDuration(seconds) {
  if (!seconds) return '–';
  const m = Math.floor(seconds / 60);
  const s = seconds % 60;
  return `${m}m ${String(s).padStart(2,'0')}s`;
}

let currentRoute = '';
function navigate(hash) {
  window.location.hash = hash;
  document.getElementById('sidebar').classList.remove('open');
  const overlay = document.querySelector('.sidebar-overlay');
  if (overlay) overlay.classList.remove('active');
}
function getRoute() { return window.location.hash || '#/'; }

window.addEventListener('hashchange', route);

function route() {
  if (!isLoggedIn()) return;
  const hash = getRoute();
  currentRoute = hash;
  document.querySelectorAll('.nav-item').forEach(n => {
    const r = n.dataset.route;
    n.classList.toggle('active', hash === r || (r !== '#/' && r !== '#/selskaper' && hash.startsWith(r)) || (r === '#/selskaper' && (hash.startsWith('#/selskap'))));
  });
  if (hash === '#/') renderDashboard();
  else if (hash === '#/selskaper') renderCompanies();
  else if (hash.startsWith('#/selskap/')) renderCompanyDetail(hash.split('/')[2]);
  else if (hash.startsWith('#/kunde/')) renderCustomerDetail(hash.split('/')[2]);
  else if (hash === '#/kalender') renderCalendar();
  else if (hash === '#/chat') renderChat();
  else if (hash === '#/auto-rettinger') renderAutoFixes();
  else if (hash === '#/innstillinger') renderSettings();
  else if (hash === '#/innstillingar') renderSettings();
  else renderDashboard();
}

// ── Dashboard filter by stat card ──
function showDashFilteredCustomers(status, source) {
  const allCustomers = window._dashboardCustomers || [];
  let filtered = allCustomers;
  let title = 'Alle kunder';
  if (status === 'confirmed') {
    filtered = allCustomers.filter(c => c.confirmation_status === 'confirmed');
    title = 'Bekreftet (' + filtered.length + ')';
  } else if (status && status !== 'all') {
    filtered = allCustomers.filter(c => c.status === status);
    if (source === 'samtale') filtered = filtered.filter(c => c.source === 'Telefon');
    else if (source === 'chatbot') filtered = filtered.filter(c => c.source === 'Chatbot');
    else if (source === 'melding') filtered = filtered.filter(c => c.source === 'Manuell');
    title = status + (source ? ' via ' + source : '') + ' (' + filtered.length + ')';
  } else {
    title = 'Alle kunder (' + filtered.length + ')';
  }
  // Create or update a filtered list section below the stats
  let listEl = document.getElementById('dash-filtered-list');
  if (!listEl) {
    listEl = document.createElement('div');
    listEl.id = 'dash-filtered-list';
    listEl.style.cssText = 'margin-top:1.5rem;';
    // Insert after the grid section
    const statsEl = document.getElementById('dash-stats');
    if (statsEl && statsEl.parentNode) {
      statsEl.parentNode.insertBefore(listEl, statsEl.nextSibling);
    }
  }
  if (!filtered.length) {
    listEl.innerHTML = `<div class="stat-card"><div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1rem;"><h3 style="font-weight:600; color:var(--text2);">${title}</h3><button class="btn btn-secondary" style="font-size:.75rem;" onclick="this.closest('#dash-filtered-list').remove()">✕ Lukk</button></div>${emptyState('Ingen kunder med denne statusen')}</div>`;
    return;
  }
  listEl.innerHTML = `<div class="stat-card" style="overflow-x:auto;">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1rem;">
      <h3 style="font-weight:600; color:var(--text2);">${title}</h3>
      <button class="btn btn-secondary" style="font-size:.75rem;" onclick="this.closest('#dash-filtered-list').remove()">✕ Lukk</button>
    </div>
    <div style="display:grid; grid-template-columns:repeat(auto-fill, minmax(280px, 1fr)); gap:.5rem; margin-top:.5rem;">` +
    filtered.map(c => `<div style="background:var(--bg2); border:1px solid var(--border); border-radius:.5rem; padding:.65rem .85rem; cursor:pointer; transition:all .15s;" onmouseover="this.style.borderColor='var(--accent)'" onmouseout="this.style.borderColor='var(--border)'" onclick="navigate('#/kunde/${c.id}')">
      <div style="display:flex; justify-content:space-between; align-items:center;">
        <span style="font-weight:600; color:var(--text); font-size:.9rem;">${errorWarning(c)} ${c.name||'Ukjent'}</span>
        ${statusBadge(c.status)}
      </div>
      <div style="font-size:.75rem; color:var(--text3); margin-top:.25rem;">${c.company_name||'–'} · ${fmtPhone(c.phone)}</div>
      <div style="display:flex; justify-content:space-between; margin-top:.35rem; font-size:.78rem;">
        <span style="color:var(--text2);">${c.service_requested||'–'}</span>
        <span style="color:var(--text3);">${fmtDate(c.preferred_date||c.appointment_date)}</span>
      </div>
    </div>`).join('') + '</div></div>';
}

// ── Companies ──
function channelLabels(c) {
  const labels = [];
  if (c.feature_phone !== false) labels.push('telefon-kunde');
  if (c.feature_chatbot !== false) labels.push('chatbot-kunde');
  if (c.feature_inbound_sms === true) labels.push('melding-kunde');
  return labels.length ? ' <span style="font-size:.6rem; color:#94a3b8; font-weight:400;">(' + labels.join(', ') + ')</span>' : '';
}

// Source filter for company customers
let _currentSourceFilter = '';
function setSourceFilter(source, companyId, btn) {
  _currentSourceFilter = source;
  document.querySelectorAll('.source-tab').forEach(b => {
    b.classList.remove('active');
    b.style.background = '#1e293b';
    b.style.color = 'var(--text3)';
    b.style.border = '1px solid var(--border)';
  });
  if (btn) {
    btn.classList.add('active');
    btn.style.background = 'var(--accent)';
    btn.style.color = '#fff';
    btn.style.border = '1px solid var(--accent)';
  }
  filterCompanyCustomers(companyId);
}

function filterCompanyCustomers(companyId) {
  const customers = window._companyCustomers || [];
  const q = ($('cd-q')?.value || '').toLowerCase();
  const status = $('cd-status')?.value || '';
  const date = $('cd-date')?.value || '';

  let filtered = customers;
  if (_currentSourceFilter) {
    filtered = filtered.filter(c => {
      const src = c.source || 'Telefon';
      if (_currentSourceFilter === 'Melding') return src === 'Melding' || src === 'Manuell';
      return src === _currentSourceFilter;
    });
  }
  if (q) {
    filtered = filtered.filter(c =>
      (c.name||'').toLowerCase().includes(q) ||
      (c.phone||'').includes(q)
    );
  }
  if (status) {
    filtered = filtered.filter(c => c.status === status);
  }
  if (date) {
    filtered = filtered.filter(c => {
      const d = (c.preferred_date || c.appointment_date || '').split('T')[0];
      return d === date;
    });
  }
  renderCompanyCustomerTable(filtered);
}

function renderCompanyCustomerTable(custs) {
  const t = $('cd-table');
  if (!t) return;
  if (!custs.length) { t.innerHTML = emptyState('Ingen kunder funnet'); return; }
  t.innerHTML = `<div style="display:grid; grid-template-columns:repeat(auto-fill, minmax(320px, 1fr)); gap:.75rem;">` +
  custs.map(c => {
    const src = c.source||'Telefon';
    const srcLabel = src==='Chatbot' ? 'chatbot-kunde' : (src==='Manuell'||src==='Melding') ? 'melding-kunde' : 'telefon-kunde';
    const srcIcon = src==='Chatbot' ? '💬' : (src==='Manuell'||src==='Melding') ? '📱' : '📞';
    const srcColor = src==='Chatbot' ? '#8b5cf6' : (src==='Manuell'||src==='Melding') ? '#f59e0b' : '#3b82f6';
    const callCount = c.call_count || 0;
    const svc = c.service_requested || '–';
    const date = fmtDate(c.preferred_date || c.appointment_date);
    const time = c.preferred_time || c.appointment_time || '';
    const dateTime = time ? `${date} kl ${time}` : date;
    const confStatus = c.confirmation_status === 'confirmed' ? '✅' : c.confirmation_status === 'pending' ? '⏳' : '';
    return `<div class="stat-card" style="cursor:pointer; padding:.85rem 1rem; transition:all .15s; border-left:3px solid ${srcColor};" onmouseover="this.style.borderColor='var(--accent)'" onmouseout="this.style.borderColor='${srcColor}'" onclick="navigate('#/kunde/${c.id}')">
      <div style="display:flex; justify-content:space-between; align-items:flex-start; gap:.5rem;">
        <div style="flex:1; min-width:0;">

async function renderSidebarConfirmed() {
  const el = $('sidebar-conf-list');
  if (!el) return;
  try {
    const companies = companiesCache.length ? companiesCache : await api('/api/companies');
    if (!companiesCache.length) companiesCache = companies;
    // Filter by company if not admin
    const filteredCompanies = (!isAdmin && currentCompanyId) ? companies.filter(c => String(c.id) === String(currentCompanyId)) : companies;
    let count = 0;
    await Promise.all(filteredCompanies.map(async c => {
      try {
        const custs = await api('/api/companies/' + c.id + '/customers');
        count += custs.filter(cu => cu.confirmation_status === 'confirmed' && !['Avbestilt','Fullført','Betalt'].includes(cu.status)).length;
      } catch(e) {}
    }));
    if (!count) { el.innerHTML = '<div style="color:var(--text3); font-size:.8rem; padding-left:.5rem;">Ingen bekreftede</div>'; return; }
    el.innerHTML = '<div style="display:flex; align-items:center; gap:.5rem; padding:.5rem .75rem; border-radius:.5rem; cursor:pointer; transition:all .15s;" onmouseover="this.style.background=\'var(--bg3)\'" onmouseout="this.style.background=\'\'" onclick="navigate(\'#/kalender\')">' +
      '<span style="font-size:1.1rem;">✅</span>' +
      '<span style="font-weight:700; font-size:.9rem; color:var(--text);">' + count + ' bekreftede timer</span>' +
      '<span style="font-size:.7rem; color:var(--text3); margin-left:auto;">📅</span>' +
    '</div>';
  } catch(e) { el.innerHTML = ''; }
}

// ── Sidebar pending badge on nav ──
async function renderSidebarCompanies() {
  const badge = $('nav-pending-badge');
  if (!badge) return;
  try {
    const allCompanies = companiesCache.length ? companiesCache : await api('/api/companies');
    if (!companiesCache.length) companiesCache = allCompanies;
    const companies = (!isAdmin && currentCompanyId) ? allCompanies.filter(c => String(c.id) === String(currentCompanyId)) : allCompanies;
    let totalPending = 0;
    await Promise.all(companies.map(async c => {
      try {
        const p = await api('/api/companies/' + c.id + '/pending');
        totalPending += (p.length || 0);
      } catch(e) {}
    }));
    if (totalPending > 0) {
      badge.style.display = 'inline';
      badge.innerHTML = '<span style="animation:pulse-warn 1s infinite;">⚠️</span> ' + totalPending;

}

const FEAT_LABELS = {
  feature_phone: '📞 Telefon', feature_chatbot: '💬 Chatbot',
  feature_inbound_sms: '📥 Kundemeldinger til bedriftsnr.',
  feature_employee_alert: '📋 Ansattvarsling', feature_auto_confirm: '📨 Auto-bekreftelse',
  feature_auto_messages: '📨 Automatiske meldinger',
  feature_customer_confirm: '✅ Kundebekreftelse', feature_reminder: '⏰ Påminnelse',
  feature_info_in: '📥 INFO INN', feature_info_out: '📤 INFO UT',
  feature_base44: '🌐 Base44', feature_auto_confirm: '📨 Auto-bekreftelse',
};

const INFO_IN_SUBS = ['feature_phone','feature_chatbot','feature_inbound_sms'];
const INFO_OUT_SUBS = ['feature_employee_alert','feature_auto_confirm','feature_customer_confirm','feature_reminder'];

async function toggleFeature(companyId, featureName, btn) {
  const isOn = btn.getAttribute('data-on') === 'true';
  const newVal = !isOn;
  try {
    const res = await fetch(`/api/companies/${companyId}`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ [featureName]: newVal })
    });
    if (!res.ok) throw new Error('Feilet');
    const label = FEAT_LABELS[featureName] || featureName;
    updateBtnVisuals(btn, newVal, label);
    showToast(`${label} er nå ${newVal ? 'PÅ' : 'AV'}`);
  } catch(e) {
    showToast('❌ Kunne ikke endre feature: ' + e.message);
  }
}

async function toggleAutoMessages(companyId, btn) {
  const isOn = btn.dataset.on === 'true';
  const newVal = !isOn;
  try {
    const res = await fetch('/api/companies/' + companyId, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ feature_auto_messages: newVal })
    });
    if (!res.ok) throw new Error('Feilet');
    btn.dataset.on = String(newVal);
    btn.style.borderColor = newVal ? '#a78bfa' : '#ef4444';
    btn.style.background = newVal ? '#7c3aed22' : '#ef444422';
    btn.style.color = newVal ? '#a78bfa' : '#ef4444';
    btn.textContent = '📨 Automatiske meldinger ' + (newVal ? 'PÅ' : 'AV');
    btn.style.borderColor = newVal ? '#a78bfa' : '#ef4444';
    btn.style.background = newVal ? '#7c3aed22' : '#ef444422';
    btn.style.color = newVal ? '#a78bfa' : '#ef4444';
    // Update description text
    const desc = btn.nextElementSibling;
    if (desc && desc.tagName === 'P') desc.textContent = newVal ? 'Alle 4 meldinger sendes automatisk etter samtale' : 'Hver melding må bekreftes manuelt';
    // Re-render pending section (hide/show based on auto_messages)
    if (currentCompanyData) { currentCompanyData.feature_auto_messages = newVal; renderPendingBookings(companyId); }
    // Update description
    const desc = btn.parentElement.querySelector('p');
    if (desc) desc.textContent = newVal ? 'Meldinger sendes ut automatisk etter samtaler' : 'Hver melding må bekreftes manuelt';
  } catch(e) { alert('Feil: ' + e.message); }
}

async function toggleMasterFeature(companyId, featureName, btn, groupPrefix) {
  const isOn = btn.getAttribute('data-on') === 'true';
  const newVal = !isOn;
  const subs = groupPrefix === 'info-in' ? INFO_IN_SUBS : INFO_OUT_SUBS;
  try {
    const body = { [featureName]: newVal };
    const res = await fetch(`/api/companies/${companyId}`, {
      method: 'PATCH', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    if (!res.ok) throw new Error('Feilet');
    const label = FEAT_LABELS[featureName] || featureName;
    updateBtnVisuals(btn, newVal, label);
    // When master OFF → visually gray out all sub-buttons
    const subContainer = document.getElementById(`${groupPrefix}-sub-${companyId}`);
    if (subContainer) {
      subContainer.querySelectorAll('.sub-toggle-btn').forEach(sb => {
        if (!newVal) {
          // Master OFF: all subs appear red/disabled
          sb.style.borderColor = '#ef4444';
          sb.style.background = '#ef444422';
          sb.style.color = '#ef4444';
          sb.style.opacity = '0.5';
          sb.style.pointerEvents = 'none';
        } else {
          // Master ON: restore individual states
          const subOn = sb.getAttribute('data-on') === 'true';
          const subColor = subOn ? '#22c55e' : '#ef4444';
          sb.style.borderColor = subColor;
          sb.style.background = subOn ? '#16a34a22' : '#ef444422';
          sb.style.color = subColor;
          sb.style.opacity = '1';
          sb.style.pointerEvents = 'auto';
        }
      });
    }
    showToast(`${label} er nå ${newVal ? 'PÅ' : 'AV'}`);
  } catch(e) {
    showToast('❌ Kunne ikke endre feature: ' + e.message);
  }
}

async function confirmAppointment(bookingId, customerId) {
  if (!confirm('Bekreft denne bestillingen?')) return;
  try {
    // Try booking endpoint first, fallback to customer endpoint
    let res;
    if (bookingId) {
      res = await fetch(`/api/bookings/${bookingId}/confirm`, {
        method: 'POST', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ confirmed_by: 'CRM' })
      });
    }
    if (!res || !res.ok) {
      res = await fetch(`/api/customers/${customerId}/confirm`, {
        method: 'POST', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ confirmed_by: 'CRM' })
      });
    }
    if (!res.ok) { const err = await res.json().catch(()=>({})); throw new Error(err.error || 'Bekreftelse feilet'); }
    showToast('✅ Bestilling bekreftet! SMS sendes til kunden.');
    if (window._currentCompanyDetailId) renderCompanyDetail(window._currentCompanyDetailId);
  } catch(e) { alert('❌ Feil: ' + e.message); }
}

function showToast(msg) {
  const t = document.createElement('div');
  t.style.cssText = 'position:fixed;top:1.5rem;right:1.5rem;background:#22c55e;color:white;padding:1rem 1.5rem;border-radius:.75rem;font-weight:600;z-index:9999;box-shadow:0 4px 20px #0008;animation:slideIn .3s ease;max-width:90vw;';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => { t.style.opacity = '0'; t.style.transition = 'opacity .3s'; setTimeout(() => t.remove(), 300); }, 3500);
}

async function saveEditCustomer(id) {
  const body = {
    name: $('edc-name').value,
    phone: $('edc-phone').value,
    address: $('edc-address').value,
    postal_code: $('edc-postal').value,
    service_requested: ($('edc-service')?.value === 'Annet' ? ($('edc-service-custom')?.value || 'Annet') : $('edc-service')?.value) || '',
    preferred_date: $('edc-date')?.value || '',
    preferred_time: $('edc-time')?.value || '',
    status: $('edc-status').value,
    comment: $('edc-comment')?.value || ''
  };
  try {
    // Try PUT first, fall back to PATCH
    try {
      await api(`/api/customers/${id}`, { method: 'PUT', body: JSON.stringify(body) });
    } catch(e) {
      await api(`/api/customers/${id}`, { method: 'PATCH', body: JSON.stringify(body) });
    }
    document.querySelector('.modal-overlay')?.remove();
    // Refresh the current view
    const detailId = window._currentCompanyDetailId;
    if (detailId) {
      renderCompanyDetail(detailId);
    } else if (currentRoute.startsWith('#/kunde/')) {
      renderCustomerDetail(id);
    }
  } catch(e) { alert('Feil ved oppdatering av kunde'); }
}

async function deleteCustomer(id) {
  if (!confirm('Er du sikker på at du vil slette denne kunden? Denne handlingen kan ikke angres.')) return;
  try {
    await api(`/api/customers/${id}`, { method: 'DELETE' });
    document.querySelector('.modal-overlay')?.remove();
    const detailId = window._currentCompanyDetailId;
    if (detailId) {
      renderCompanyDetail(detailId);
    } else {
      navigate('#/');
    }
  } catch(e) { alert('Feil ved sletting av kunde'); }
}

// Track generated dates for the date list
let ncGeneratedDates = [];

function toggleAvailDates() {
  const val = document.querySelector('input[name="nc-avail"]:checked')?.value || 'specific';
  const singleEl = $('nc-date-single');
  const rangeEl = $('nc-date-range');
  const datesSection = $('nc-dates-section');
  const dateListContainer = $('nc-date-list-container');
  const simpleTime = $('nc-simple-time');

  if (val === 'specific') {
    singleEl.style.display = 'flex';
    rangeEl.style.display = 'none';
    datesSection.style.display = '';
    if (dateListContainer) dateListContainer.style.display = 'none';
    if (simpleTime) simpleTime.style.display = 'flex';
  } else if (val === 'range') {
    singleEl.style.display = 'none';
    rangeEl.style.display = 'flex';
    datesSection.style.display = '';
    if (simpleTime) simpleTime.style.display = 'none';
    // Date list shown after clicking "Generer datoer"
  } else {
    // anytime
    singleEl.style.display = 'none';
    rangeEl.style.display = 'none';
    datesSection.style.display = 'none';
    if (dateListContainer) dateListContainer.style.display = 'none';
    if (simpleTime) simpleTime.style.display = 'flex';
  }
}

function generateDateList() {
  const fromStr = $('nc-date-from')?.value;
  const toStr = $('nc-date-to')?.value;
  if (!fromStr || !toStr) { alert('Velg fra- og til-dato først'); return; }

  const from = new Date(fromStr);
  const to = new Date(toStr);
  if (from > to) { alert('Fra-dato må være før til-dato'); return; }

  ncGeneratedDates = [];
  const d = new Date(from);
  while (d <= to) {
    ncGeneratedDates.push({ date: d.toISOString().split('T')[0], timeFrom: '08:00', timeTo: '16:00', excluded: false });
    d.setDate(d.getDate() + 1);
  }

  renderDateList();
}

function renderDateList() {
  const container = $('nc-date-list-container');
  const list = $('nc-date-list');
  const countEl = $('nc-date-count');
  if (!container || !list) return;

  container.style.display = 'block';
  const activeDates = ncGeneratedDates.filter(d => !d.excluded);
  countEl.textContent = `${activeDates.length} aktive av ${ncGeneratedDates.length} datoer`;

  const dayNames = ['Søn', 'Man', 'Tir', 'Ons', 'Tor', 'Fre', 'Lør'];
  list.innerHTML = ncGeneratedDates.map((d, i) => {
    const dt = new Date(d.date + 'T12:00:00');
    const dayName = dayNames[dt.getDay()];
    const formatted = `${dayName} ${dt.getDate()}.${dt.getMonth()+1}`;
    const isExcluded = d.excluded;
    return `<div style="display:flex; align-items:center; gap:.5rem; padding:.35rem .5rem; border-radius:6px; background:${isExcluded ? '#fee2e2' : 'white'}; opacity:${isExcluded ? '0.6' : '1'}; border:1px solid ${isExcluded ? '#fca5a5' : 'var(--border)'};">
      <span style="font-size:.8rem; font-weight:600; min-width:75px; color:${isExcluded ? '#dc2626' : 'var(--text1)'}; ${isExcluded ? 'text-decoration:line-through;' : ''}">${formatted}</span>
      ${isExcluded ? `<span style="font-size:.75rem; color:#dc2626; flex:1;">Ekskludert</span>` :
      `<input type="time" value="${d.timeFrom}" onchange="ncGeneratedDates[${i}].timeFrom=this.value" style="font-size:.75rem; max-width:90px;">
       <span style="font-size:.75rem; color:var(--text3);">–</span>
       <input type="time" value="${d.timeTo}" onchange="ncGeneratedDates[${i}].timeTo=this.value" style="font-size:.75rem; max-width:90px;">`}
      <button type="button" onclick="toggleDateExclude(${i})" style="font-size:.75rem; padding:.15rem .4rem; border:none; border-radius:4px; cursor:pointer; background:${isExcluded ? 'var(--success)' : '#fee2e2'}; color:${isExcluded ? 'white' : '#dc2626'};">${isExcluded ? '↩️' : '✕'}</button>
    </div>`;
  }).join('');
}

function toggleDateExclude(index) {
  ncGeneratedDates[index].excluded = !ncGeneratedDates[index].excluded;
  renderDateList();
}

function applyTimeToAll() {
  const tf = $('nc-first-time-from')?.value || '08:00';
  const tt = $('nc-first-time-to')?.value || '16:00';
  ncGeneratedDates.forEach(d => {
    if (!d.excluded) { d.timeFrom = tf; d.timeTo = tt; }
  });
  renderDateList();
}

function addExtraDate() {
  const dateVal = $('nc-extra-date')?.value;
  if (!dateVal) { alert('Velg en dato å legge til'); return; }
  // Check if already exists
  if (ncGeneratedDates.find(d => d.date === dateVal)) { alert('Denne datoen finnes allerede i listen'); return; }
  ncGeneratedDates.push({ date: dateVal, timeFrom: '08:00', timeTo: '16:00', excluded: false });
  // Sort by date
  ncGeneratedDates.sort((a, b) => a.date.localeCompare(b.date));
  renderDateList();
  $('nc-extra-date').value = '';
}

function updateNewCustServices() {
  const sel = $('nc-company');
  if (!sel) return;
  const opt = sel.options[sel.selectedIndex];
  const industry = opt?.dataset?.industry || 'general';
  const ind = INDUSTRIES.find(i => i.value === industry) || INDUSTRIES.find(i => i.value === 'general');
  const serviceSel = $('nc-service');
  if (serviceSel) {
    serviceSel.innerHTML = '<option value="">Velg tjeneste...</option>' + (ind?.services || []).map(s => `<option value="${s}">${s}</option>`).join('');
  }
}

async function createCustomer() {
  const availType = document.querySelector('input[name="nc-avail"]:checked')?.value || 'specific';

  let preferredDate = '';
  let preferredDateEnd = '';
  let preferredTime = '';
  let availabilityJson = null;
  let excludedDates = null;

  if (availType === 'specific') {
    preferredDate = $('nc-date')?.value || '';
    const tf = $('nc-time-from')?.value || '';
    const tt = $('nc-time-to')?.value || '';
    preferredTime = (tf && tt) ? `${tf} - ${tt}` : tf || '';
  } else if (availType === 'range') {
    preferredDate = $('nc-date-from')?.value || '';
    preferredDateEnd = $('nc-date-to')?.value || '';
    // Use advanced date list if generated
    if (ncGeneratedDates.length > 0) {
      const activeDates = ncGeneratedDates.filter(d => !d.excluded);
      const excDates = ncGeneratedDates.filter(d => d.excluded).map(d => d.date);
      availabilityJson = JSON.stringify(activeDates.map(d => ({ date: d.date, from: d.timeFrom, to: d.timeTo })));
      excludedDates = excDates.length > 0 ? JSON.stringify(excDates) : null;
      // Set preferred_time from first active date
      if (activeDates.length > 0) {
        preferredTime = `${activeDates[0].timeFrom} - ${activeDates[0].timeTo}`;
      }
    } else {
      const tf = $('nc-time-from')?.value || '';
      const tt = $('nc-time-to')?.value || '';
      preferredTime = (tf && tt) ? `${tf} - ${tt}` : tf || '';
    }
  } else {
    // anytime
    const tf = $('nc-time-from')?.value || '';
    const tt = $('nc-time-to')?.value || '';
    preferredTime = (tf && tt) ? `${tf} - ${tt}` : tf || '';
  }

  // Get company id
  let companyId;
  if ($('nc-company-id')) {
    companyId = $('nc-company-id').value;
  } else if ($('nc-company')) {
    companyId = $('nc-company').value;
  } else {
    companyId = currentCompanyId;
  }

  const body = {
    name: $('nc-name').value,
    phone: $('nc-phone').value,
    address: $('nc-address').value,
    postal_code: $('nc-postal').value,
    company_id: companyId || null,
    preferred_date: preferredDate,
    preferred_date_end: preferredDateEnd,
    preferred_time: preferredTime,
    availability_type: availType,
    availability_json: availabilityJson,
    excluded_dates: excludedDates,
    service_requested: ($('nc-service')?.value === 'Annet' ? ($('nc-service-custom')?.value || 'Annet') : $('nc-service')?.value) || '',
    comment: $('nc-comment')?.value || '',
    status: $('nc-status')?.value || 'Ny'
  };

  try {
    await api('/api/customers', { method:'POST', body: JSON.stringify(body) });
    document.querySelector('.modal-overlay')?.remove();
    // Refresh company detail if we're on that page
    const detailId = window._currentCompanyDetailId;
    if (detailId && companyId == detailId) {
      renderCompanyDetail(detailId);
    }
  } catch(e) { alert('Feil ved oppretting'); }
}

// ===== LOGO HÅNDTERING =====
let companyLogoData = null;
function handleLogoFile(file) {
  if (!file || !file.type.startsWith('image/')) return;
  const reader = new FileReader();
  reader.onload = e => {
    companyLogoData = e.target.result;
    const preview = $('nc-logo-preview');
    const placeholder = $('nc-logo-placeholder');
    const clearBtn = $('nc-logo-clear');
    preview.src = companyLogoData;
    preview.style.display = 'block';
    placeholder.style.display = 'none';
    if (clearBtn) clearBtn.style.display = 'inline-block';
  };
  reader.readAsDataURL(file);
}
function handleLogoDrop(event) {
  const file = event.dataTransfer?.files?.[0];
  if (file) handleLogoFile(file);
}
function clearLogo() {
  companyLogoData = null;
  const preview = $('nc-logo-preview');
  const placeholder = $('nc-logo-placeholder');
  const clearBtn = $('nc-logo-clear');
  preview.style.display = 'none';
  preview.src = '';
  placeholder.style.display = 'block';
  if (clearBtn) clearBtn.style.display = 'none';
}
// Lim inn (Ctrl+V) logo support
document.addEventListener('paste', e => {
  const modal = document.querySelector('.modal-overlay');
  if (!modal) return;
  const logoDropArea = $('nc-logo-drop') || $('ec-logo-drop');
  if (!logoDropArea) return;
  const items = e.clipboardData?.items;
  for (let i = 0; i < (items?.length||0); i++) {
    if (items[i].type.startsWith('image/')) {
      handleLogoFile(items[i].getAsFile());
      e.preventDefault();
      break;
    }
  }
});

// Edit logo for existing company
let editLogoData = undefined; // undefined = no change, null = remove, string = new logo

function generatePassword() {
  const words = ['fjord','bjørk','sol','gran','storm','fjell','skog','elv','bris','regn','snø','stein','dal','hav','nord','sør','vind','kveld','morgen','blomst','foss','strand','himmel','lyng','bjørn','ulv','ørn','laks','bre','topp','ild','frost','sky','bekk','eng','ås','myr','bukt','vik','sund','tind','li','haug','mo','vann','berg','kyst','gård','hei','rein'];
  const w1 = words[Math.floor(Math.random()*words.length)];
  const w2 = words[Math.floor(Math.random()*words.length)];
  const digits = String(Math.floor(Math.random()*900)+100);
  return w1 + w2 + digits;
}

function formatAudioTime(s) {
  if (!s || isNaN(s)) return '--:--';
  const m = Math.floor(s / 60);
  const sec = Math.floor(s % 60);
  return m + ':' + (sec < 10 ? '0' : '') + sec;
}

function toggleAudioPlay(callId) {
  const audio = document.getElementById('audio-' + callId);
  const btn = audio?.parentElement?.querySelector('.audio-play-btn');
  if (!audio || !btn) return;
  
  // Pause all other players
  document.querySelectorAll('.custom-audio-player audio').forEach(a => {
    if (a.id !== 'audio-' + callId && !a.paused) {
      a.pause();
      const otherBtn = a.parentElement?.querySelector('.audio-play-btn');
      if (otherBtn) otherBtn.textContent = '▶';
    }
  });
  
  if (audio.paused) {
    audio.play();
    btn.textContent = '⏸';
    
    // Setup progress tracking if not already
    if (!audio.dataset.tracking) {
      audio.dataset.tracking = '1';
      audio.addEventListener('timeupdate', () => {
        const pct = (audio.currentTime / audio.duration) * 100;
        const fill = document.getElementById('progress-' + callId);
        const cur = document.getElementById('time-current-' + callId);
        if (fill) fill.style.width = pct + '%';
        if (cur) cur.textContent = formatAudioTime(audio.currentTime);
      });
      audio.addEventListener('loadedmetadata', () => {
        const tot = document.getElementById('time-total-' + callId);
        if (tot) tot.textContent = formatAudioTime(audio.duration);
      });
      audio.addEventListener('ended', () => {
        btn.textContent = '▶';
        const fill = document.getElementById('progress-' + callId);
        if (fill) fill.style.width = '0%';
        const cur = document.getElementById('time-current-' + callId);
        if (cur) cur.textContent = '0:00';
      });
      // If metadata already loaded
      if (audio.duration) {
        const tot = document.getElementById('time-total-' + callId);
        if (tot) tot.textContent = formatAudioTime(audio.duration);
      }
    }
  } else {
    audio.pause();
    btn.textContent = '▶';
  }
}

function seekAudio(event, callId) {
  const audio = document.getElementById('audio-' + callId);
  if (!audio || !audio.duration) return;
  const bar = event.currentTarget;
  const rect = bar.getBoundingClientRect();
  const pct = (event.clientX - rect.left) / rect.width;
  audio.currentTime = pct * audio.duration;
}

function cycleAudioSpeed(callId) {
  const audio = document.getElementById('audio-' + callId);
  const btn = document.getElementById('speed-' + callId);
  if (!audio || !btn) return;
  const speeds = [1, 1.25, 1.5, 2, 0.75];
  const curr = speeds.indexOf(audio.playbackRate);
  const next = speeds[(curr + 1) % speeds.length];
  audio.playbackRate = next;
  btn.textContent = next + 'x';
}

async function toggleTranscript(callId) {
  const div = document.getElementById('transcript-' + callId);
  if (!div) return;
  if (div.style.display === 'none') {
    div.style.display = 'block';
    if (!div.dataset.loaded) {
      div.innerHTML = '<p style="font-size:.8rem; color:var(--text3);">Laster transkripsjon...</p>';
      try {
        const data = await api('/api/calls/' + callId + '/transcript');
        let html = '';
        if (data.fullAudioTranscript) {
          html += `<div style="background:var(--bg); padding:.75rem; border-radius:.5rem; margin-bottom:.5rem;">
            <p style="font-size:.7rem; font-weight:600; color:var(--text3); margin-bottom:.5rem;">🎙️ Full lydtranskripsjon:</p>
            <p style="font-size:.8rem; color:var(--text2); white-space:pre-wrap; line-height:1.5;">${escHtml(data.fullAudioTranscript)}</p>
          </div>`;
        }
        if (data.conversationTranscript) {
          html += `<div style="background:var(--bg); padding:.75rem; border-radius:.5rem; margin-bottom:.5rem;">
            <p style="font-size:.7rem; font-weight:600; color:var(--text3); margin-bottom:.5rem;">💬 Samtalelogg (AI + Kunde):</p>
            <div style="font-size:.8rem; color:var(--text2); white-space:pre-wrap; line-height:1.6;">
              ${formatConversationTranscript(data.conversationTranscript)}
            </div>
          </div>`;
        }
        if (data.extractedInfo && Object.keys(data.extractedInfo).some(k => data.extractedInfo[k])) {
          html += renderExtractedInfo(data.extractedInfo);
        }
        if (!html) {
          html = '<p style="font-size:.8rem; color:var(--text3); font-style:italic;">Ingen transkripsjon tilgjengelig ennå. Klikk "Transkriber" for å starte.</p>';
        }
        div.innerHTML = html;
        div.dataset.loaded = 'true';
      } catch(e) {
        div.innerHTML = '<p style="font-size:.8rem; color:var(--danger);">Feil ved lasting av transkripsjon</p>';
      }
    }
  } else {
    div.style.display = 'none';
  }
}

async function transcribeCall(callId) {
  const btn = document.getElementById('btn-transcribe-' + callId);
  if (btn) { btn.textContent = '⏳ Transkriberer...'; btn.disabled = true; }
  try {
    const data = await api('/api/calls/' + callId + '/transcribe', { method: 'POST' });
    if (data.transcript) {
      const div = document.getElementById('transcript-' + callId);
      if (div) { div.dataset.loaded = ''; }
      await toggleTranscript(callId);
      if (div && div.style.display === 'none') await toggleTranscript(callId);
      if (btn) { btn.textContent = '✅ Ferdig'; btn.style.color = 'var(--success)'; }
    }
  } catch(e) {
    if (btn) { btn.textContent = '❌ Feilet'; btn.disabled = false; }
  }
}

async function transcribeAllCalls() {
  const btn = document.getElementById('btn-transcribe-all');
  if (btn) { btn.textContent = '⏳ Transkriberer...'; btn.disabled = true; }
  try {
    const data = await api('/api/calls/transcribe-all', { method: 'POST' });
    if (btn) { btn.textContent = `✅ ${data.count || 0} samtaler startet`; }
    setTimeout(() => { if (btn) { btn.textContent = '🔄 Transkriber alle'; btn.disabled = false; } }, 5000);
  } catch(e) {
    if (btn) { btn.textContent = '❌ Feilet'; btn.disabled = false; }
  }
}

function formatConversationTranscript(text) {
  if (!text) return '';
  return text.split('\n').map(line => {
    if (line.startsWith('AI:')) {
      return `<div style="margin-bottom:.4rem;"><span style="color:var(--primary); font-weight:600;">🤖 AI:</span> ${escHtml(line.substring(3).trim())}</div>`;
    } else if (line.startsWith('Kunde:')) {
      return `<div style="margin-bottom:.4rem;"><span style="color:var(--success); font-weight:600;">👤 Kunde:</span> ${escHtml(line.substring(6).trim())}</div>`;
    }
    return `<div style="margin-bottom:.4rem;">${escHtml(line)}</div>`;
  }).join('');
}

function renderExtractedInfo(info) {
  const fields = [
    { key: 'navn', label: '👤 Navn' },
    { key: 'adresse', label: '📍 Adresse' },
    { key: 'postnummer', label: '📮 Postnummer' },
    { key: 'telefon', label: '📱 Telefon' },
    { key: 'epost', label: '📧 E-post' },
    { key: 'behov', label: '🔧 Behov' },
    { key: 'dato', label: '📅 Ønsket dato' },
    { key: 'klokkeslett', label: '🕐 Klokkeslett' },
    { key: 'tilgjengelighet', label: '📆 Tilgjengelighet' },
    { key: 'spesielle_behov', label: '⚠️ Spesielle behov' },
    { key: 'prisforventning', label: '💰 Prisforventning' },
    { key: 'hastegrad', label: '🚨 Hastegrad' },
    { key: 'ekstra_detaljer', label: '📋 Ekstra detaljer' },
    { key: 'sammendrag', label: '📝 Sammendrag' },
  ];
  const rows = fields
    .filter(f => info[f.key] && info[f.key] !== 'null' && info[f.key] !== null)
    .map(f => `<tr><td style="font-weight:600; font-size:.75rem; color:var(--text3); padding:.25rem .5rem .25rem 0; white-space:nowrap; vertical-align:top;">${f.label}</td><td style="font-size:.8rem; color:var(--text2); padding:.25rem 0;">${escHtml(String(info[f.key]))}</td></tr>`)
    .join('');
  if (!rows) return '';
  return `<div style="background:linear-gradient(135deg, #0f2a1a 0%, #132a1e 100%); padding:.75rem; border-radius:.5rem; border:1px solid #22543d; margin-top:.5rem;">
    <p style="font-size:.7rem; font-weight:700; color:#4ade80; margin-bottom:.5rem;">🔍 Uttrekket informasjon fra samtalen:</p>
    <table style="width:100%; border-collapse:collapse;">${rows}</table>
  </div>`;
}

function extractedInfoBadge(call) {
  let info = call.extracted_info;
  if (!info) return '';
  if (typeof info === 'string') { try { info = JSON.parse(info); } catch(e) { return ''; } }
  if (!info || typeof info !== 'object') return '';
  const hasData = Object.keys(info).some(k => info[k] && info[k] !== 'null');
  if (!hasData) return '';
  return `<div style="margin-top:.5rem;"><span class="badge badge-green" style="font-size:.65rem;">🔍 Info uttrekket</span></div>`;
}

function renderCallAnalysis(call) {
  let analysis = call.analysis_json;
  if (!analysis) return '';
  if (typeof analysis === 'string') { try { analysis = JSON.parse(analysis); } catch(e) { return ''; } }
  if (!analysis || typeof analysis !== 'object') return '';
  let html = `<div style="margin-top:.75rem; border-left:3px solid #22c55e; background:var(--bg); border-radius:0 .5rem .5rem 0; padding:.75rem 1rem;">
    <h4 style="color:#22c55e; margin-bottom:.5rem; font-size:.8rem;">🔄 Automatiske forbedringer</h4>
    <p style="color:var(--text3); font-size:.7rem; margin-bottom:.5rem;">Basert på GPT-4o-analyse av samtalen</p>`;
  if (analysis.kvalitetsscore !== undefined) {
    const score = analysis.kvalitetsscore;
    const color = score >= 7 ? '#22c55e' : score >= 4 ? '#f59e0b' : '#ef4444';
    html += `<div style="display:flex; align-items:center; gap:.5rem; margin-bottom:.5rem;">
      <span style="font-size:.8rem; font-weight:600; color:${color};">Kvalitet: ${score}/10</span>
    </div>`;
  }
  if (analysis.feil && analysis.feil.length > 0) {
    html += `<div style="margin-bottom:.5rem;"><p style="font-size:.75rem; font-weight:600; color:#ef4444; margin-bottom:.25rem;">⚠️ Feil funnet:</p><ul style="margin:0; padding-left:1.25rem;">`;
    analysis.feil.forEach(f => { html += `<li style="font-size:.75rem; color:var(--text2); margin-bottom:.125rem;">${escHtml(typeof f === 'string' ? f : f.beskrivelse || JSON.stringify(f))}</li>`; });
    html += `</ul></div>`;
  }
  if (analysis.forbedringsforslag && analysis.forbedringsforslag.length > 0) {
    html += `<div><p style="font-size:.75rem; font-weight:600; color:#3b82f6; margin-bottom:.25rem;">💡 Forbedringsforslag:</p><ul style="margin:0; padding-left:1.25rem;">`;
    analysis.forbedringsforslag.forEach(f => { html += `<li style="font-size:.75rem; color:var(--text2); margin-bottom:.125rem;">${escHtml(typeof f === 'string' ? f : f.forslag || JSON.stringify(f))}</li>`; });
    html += `</ul></div>`;
  }
  html += `</div>`;
  return html;
}

// ── Auto-Learning Improvements ──
async function loadCallImprovements(callId, containerId) {
  try {
    const res = await fetch('/api/improvements/call/' + callId);
    const improvements = await res.json();
    const container = document.getElementById(containerId);
    if (!container) return;
    
    if (!improvements || improvements.length === 0 || (improvements.length === 1 && improvements[0].improvement_type === 'ingen')) {
      container.innerHTML = '<p style="color:#6b7280; font-size:13px; margin:0;">✅ Ingen forbedringer nødvendig — samtalen var god</p>';
      return;
    }
    
    const activeImprovements = improvements.filter(i => i.improvement_type !== 'ingen');
    container.innerHTML = activeImprovements.map(imp => `
      <div style="background: white; border-radius: 6px; padding: 8px 10px; margin-bottom: 6px; border-left: 3px solid ${imp.severity === 'kritisk' ? '#ef4444' : imp.severity === 'viktig' ? '#f59e0b' : '#22c55e'};">
        <div style="font-weight: 600; font-size: 13px; color: #1f2937;">
          ${imp.severity === 'kritisk' ? '🔴' : imp.severity === 'viktig' ? '🟡' : '🟢'} ${escHtml(imp.title || '')}
        </div>
        <div style="font-size: 12px; color: #4b5563; margin-top: 4px;">${escHtml(imp.description || '')}</div>
        ${imp.old_behavior ? `<div style="font-size: 11px; color: #9ca3af; margin-top: 4px;">Før: ${escHtml(imp.old_behavior)}</div>` : ''}
        ${imp.new_behavior ? `<div style="font-size: 11px; color: #059669; margin-top: 2px;">Nå: ${escHtml(imp.new_behavior)}</div>` : ''}
        ${imp.active ? `<button onclick="deactivateImprovement(${imp.id}, this)" style="font-size: 11px; background: none; border: 1px solid #d1d5db; border-radius: 4px; padding: 2px 8px; margin-top: 4px; cursor: pointer; color: #6b7280;">Deaktiver</button>` : '<span style="font-size: 11px; color: #9ca3af;">Deaktivert</span>'}
      </div>
    `).join('');
    
    if (improvements[0]?.overall_note) {
      container.innerHTML += `<p style="font-size: 12px; color: #6b7280; margin: 8px 0 0 0; font-style: italic;">${escHtml(improvements[0].overall_note)}</p>`;
    }
  } catch (err) {
    const container = document.getElementById(containerId);
    if (container) container.innerHTML = '<p style="color:#ef4444; font-size:12px;">Kunne ikke laste forbedringer</p>';
  }
}

// ── Availability Management ──
const MONTHS_NO = ['jan','feb','mar','apr','mai','jun','jul','aug','sep','okt','nov','des'];

function fmtDateShort(d) {
  const dt = new Date(d);
  if (isNaN(dt)) return d;
  return `${dt.getDate()}. ${MONTHS_NO[dt.getMonth()]}`;
}

function getDatesInRange(start, end) {
  const dates = [];
  const s = new Date(start);
  const e = new Date(end);
  while (s <= e) {
    dates.push(s.toISOString().split('T')[0]);
    s.setDate(s.getDate() + 1);
  }
  return dates;
}

function timeDropdownOptions(selectedTime) {
  let opts = '<option value="">Hele dagen</option>';
  for (let h = 0; h < 24; h++) {
    for (let m = 0; m < 60; m += 30) {
      const t = String(h).padStart(2,'0') + ':' + String(m).padStart(2,'0');
      opts += `<option value="${t}" ${selectedTime === t ? 'selected' : ''}>${t}</option>`;
    }
  }
  return opts;
}

async function loadAvailability(customerId, customer) {
  const el = $('availability-section');
  if (!el) return;
  
  try {
    const data = await api(`/api/customers/${customerId}/availability`);
    const slots = data.slots || [];
    const excluded = data.excluded || [];
    
    if (slots.length === 0 && !data.preferred_date) {
      el.innerHTML = `<div style="text-align:center; padding:1.5rem 0; color:var(--text3);">
        <p style="font-size:2rem; margin-bottom:.5rem;">📅</p>
        <p style="font-size:.875rem;">Ingen tilgjengelighet registrert ennå</p>
      </div>`;
      return;
    }
    
    let html = '';
    let dateIndex = 0;
    
    // Render each slot
    for (let i = 0; i < slots.length; i++) {
      const slot = slots[i];
      const isRange = slot.end && slot.start !== slot.end;
      
      if (isRange) {
        html += `<div style="background:var(--bg); border-radius:.75rem; padding:1rem; margin-bottom:.75rem;">
          <div style="margin-bottom:.75rem;">
            <strong style="font-size:.925rem;">📅 ${fmtDateShort(slot.start)} — ${fmtDateShort(slot.end)}</strong>
          </div>
          <div style="display:flex; flex-direction:column; gap:.35rem;">`;
        
        const allDates = getDatesInRange(slot.start, slot.end);
        for (const date of allDates) {
          const isExcluded = excluded.includes(date);
          if (isExcluded) {
            html += `<div style="display:flex; align-items:center; gap:.5rem; padding:.35rem .5rem; border-radius:.375rem; background:rgba(239,68,68,0.08); border:1px dashed #ef4444;">
              <span style="font-size:.8rem; color:#ef4444; text-decoration:line-through; flex:1;">${fmtDateShort(date)}</span>
              <button onclick="reincludeDate(${customerId}, '${date}')" style="font-size:.7rem; padding:.15rem .5rem; border-radius:.25rem; border:1px solid #ef4444; background:none; color:#ef4444; cursor:pointer;" title="Legg tilbake">↩️</button>
            </div>`;
          } else {
            html += `<div style="display:flex; align-items:center; gap:.5rem; padding:.35rem .5rem; border-radius:.375rem; border:1px solid var(--border); background:var(--card-bg);">
              <span style="font-size:.8rem; color:var(--text2); flex:1;">${fmtDateShort(date)}</span>
              <select class="avail-time-select" data-date="${date}" style="font-size:.75rem; padding:.2rem .35rem; border-radius:.25rem; border:1px solid var(--border); background:var(--bg); color:var(--text); max-width:100px;">
                ${timeDropdownOptions(slot.time || '')}
              </select>
              <button onclick="excludeDate(${customerId}, '${date}')" style="font-size:.7rem; padding:.15rem .35rem; border-radius:.25rem; border:1px solid var(--border); background:none; color:var(--text3); cursor:pointer;" title="Fjern denne dagen">✕</button>
            </div>`;
          }
          dateIndex++;
        }
        html += `</div></div>`;
      } else {
        // Single date
        const dateStr = slot.start || slot.date || '';
        html += `<div style="display:flex; align-items:center; gap:.75rem; padding:.75rem 1rem; border-radius:.75rem; background:var(--bg); margin-bottom:.5rem; border:1px solid var(--border);">
          <span style="font-size:.875rem; font-weight:500; flex:1;">📅 ${fmtDateShort(dateStr)}</span>
          <select class="avail-time-select" data-date="${dateStr}" style="font-size:.8rem; padding:.3rem .5rem; border-radius:.375rem; border:1px solid var(--border); background:var(--card-bg); color:var(--text); min-width:90px;">
            ${timeDropdownOptions(slot.time || slot.from || '')}
          </select>
        </div>`;
        dateIndex++;
      }
    }
    
    // Fallback to old preferred_date if no slots
    if (slots.length === 0 && data.preferred_date) {
      const dateStr = data.preferred_date;
      const parsedDate = new Date(dateStr);
      const isValidDate = !isNaN(parsedDate.getTime());
      
      html += `<div style="display:flex; align-items:center; gap:.75rem; padding:.75rem 1rem; border-radius:.75rem; background:var(--bg); margin-bottom:.5rem; border:1px solid var(--border);">
        <span style="font-size:.875rem; font-weight:500; flex:1;">📅 ${isValidDate ? fmtDateShort(dateStr) : dateStr}${data.preferred_date_end ? ' — ' + (new Date(data.preferred_date_end).getTime() ? fmtDateShort(data.preferred_date_end) : data.preferred_date_end) : ''}</span>
        <select class="avail-time-select" data-date="${dateStr}" style="font-size:.8rem; padding:.3rem .5rem; border-radius:.375rem; border:1px solid var(--border); background:var(--card-bg); color:var(--text); min-width:90px;">
          ${timeDropdownOptions(data.preferred_time || '')}
        </select>
      </div>`;
    }
    
    // "Bruk for alle" + "Lagre" buttons
    html += `<div style="display:flex; gap:.5rem; margin-top:.75rem; flex-wrap:wrap;">
      <button class="btn btn-secondary" style="font-size:.75rem;" onclick="applyTimeToAll()">🕐 Bruk valgt tid for alle</button>
      <button class="btn btn-primary" style="font-size:.75rem;" onclick="saveAvailabilityTimes(${customerId})">💾 Lagre tider</button>
    </div>`;
    
    html += `<p style="font-size:.7rem; color:var(--text3); margin-top:.5rem;">💡 Velg klokkeslett per dato, eller "Hele dagen". Klikk ✕ for å fjerne en dato.</p>`;
    
    el.innerHTML = html;
  } catch(e) {
    el.innerHTML = '<p style="font-size:.85rem; color:var(--text3);">Kunne ikke laste tilgjengelighet</p>';
  }
}

function applyTimeToAll() {
  const selects = document.querySelectorAll('.avail-time-select');
  if (selects.length === 0) return;
  const firstVal = selects[0].value;
  selects.forEach(s => s.value = firstVal);
}

async function saveAvailabilityTimes(customerId) {
  const selects = document.querySelectorAll('.avail-time-select');
  const times = {};
  selects.forEach(s => { times[s.dataset.date] = s.value; });
  
  // Build availability_json from current times
  const slots = [];
  selects.forEach(s => {
    slots.push({ date: s.dataset.date, from: s.value || null, to: null });
  });
  
  try {
    await api(`/api/customers/${customerId}`, 'PATCH', { 
      availability_json: JSON.stringify(slots),
      preferred_time: selects.length > 0 ? (selects[0].value || 'Hele dagen') : null
    });
    alert('✅ Tider lagret!');
  } catch(e) {
    alert('❌ Feil ved lagring: ' + e.message);
  }
}

async function confirmWithDateTime(customerId) {
  const dateEl = $('confirm-date');
  const timeEl = $('confirm-time');
  const confirmedDate = dateEl ? dateEl.value : '';
  const confirmedTime = timeEl ? timeEl.value : '';
  
  if (!confirmedDate) {
    alert('Velg en dato f\u00f8rst');
    return;
  }
  
  const timeLabel = confirmedTime || 'hele dagen';
  if (!confirm(`Bekreft bestilling for ${fmtDate(confirmedDate)} kl ${timeLabel}?\n\nKunden vil motta bekreftelse-SMS.`)) return;
  
  try {
    const res = await fetch(`/api/customers/${customerId}/confirm`, {
      method: 'POST', 
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ 
        confirmed_by: 'CRM', 
        confirmed_date: confirmedDate,
        confirmed_time: confirmedTime || 'Hele dagen'
      })
    });
    if (!res.ok) throw new Error('Bekreftelse feilet');
    const data = await res.json();
    alert('✅ ' + (data.message || 'Bestilling bekreftet!'));
    const hash = window.location.hash;
    const m = hash.match(/#\/kunde\/(\d+)/);
    if (m) renderCustomerDetail(m[1]);
  } catch(e) { alert('❌ Feil: ' + e.message); }
}

async function excludeDate(customerId, date) {
  try {
    await api(`/api/customers/${customerId}/exclude-date`, 'POST', { date });
    const c = await api(`/api/customers/${customerId}`);
    loadAvailability(customerId, c);
  } catch(e) {
    alert('Feil: Kunne ikke fjerne dato');
  }
}

async function reincludeDate(customerId, date) {
  try {
    await fetch(`/api/customers/${customerId}/exclude-date`, {
      method: 'DELETE',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ date })
    });
    const c = await api(`/api/customers/${customerId}`);
    loadAvailability(customerId, c);
  } catch(e) {
    alert('Feil: Kunne ikke legge tilbake dato');
  }
}
